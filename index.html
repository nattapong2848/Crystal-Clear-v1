<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crystal Clear Back Office</title>
  <meta name="description" content="Premium back office for Clear Retainer order, impression, cost, payment and media tracking." />
  <link rel="icon" href="logo.jpeg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="aurora aurora-a"></div>
  <div class="aurora aurora-b"></div>
  <div class="aurora aurora-c"></div>

  <div id="appShell" class="app-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <img class="brand-logo" src="logo.jpeg" alt="Crystal Clear Logo" />
        <div>
          <div class="brand-kicker">Premium Dental Ops</div>
          <h1>Crystal Clear</h1>
          <p>Retainer Back Office</p>
        </div>
      </div>

      <nav id="nav" class="nav"></nav>

      <div class="side-widget">
        <div class="sparkle">✦</div>
        <strong>Focus Today</strong>
        <p id="focusText">กำลังโหลดงานที่ต้องตาม...</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="page-kicker">Crystal Clear Command Center</div>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="top-actions">
          <div class="search-wrap">
            <span>⌕</span>
            <input id="globalSearch" type="search" placeholder="ค้นหา HN / ชื่อลูกค้า / เบอร์ / สถานะ" />
          </div>
          <button class="btn secondary" data-action="refresh">รีเฟรช</button>
          <button class="btn primary" data-action="openOrderModal">+ เปิดออเดอร์</button>
        </div>
      </header>

      <section id="content" class="content"></section>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <div id="modalRoot" class="modal-root hidden"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
